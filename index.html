<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA4 AI 分析助理</title>
<style>
  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --surface2: #222228;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0; --muted: #888; --accent: #7c6ef5; --accent2: #5de0b0;
    --font: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }
  .auth-row { display: flex; align-items: center; gap: 10px; }
  .auth-status { font-size: 12px; color: var(--muted); }
  .auth-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); display: inline-block; margin-right: 5px; }
  .auth-dot.ok { background: var(--accent2); }
  .login-btn { background: #4285f4; border: none; border-radius: 8px; padding: 7px 16px; color: #fff; font-size: 13px; font-family: var(--font); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .login-btn:hover { opacity: 0.9; }
  .login-wall { flex: 1; display: flex; align-items: center; justify-content: center; }
  .login-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; padding: 40px 48px; text-align: center; max-width: 360px; }
  .login-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .login-card .login-btn { width: 100%; justify-content: center; padding: 11px; font-size: 14px; }
  .main { display: none; flex: 1; flex-direction: column; height: calc(100vh - 53px); }
  .main.visible { display: flex; }
  .source-bar { padding: 12px 24px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .bubble-wrap { display: flex; gap: 10px; }
  .bubble-wrap.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .avatar.user { background: var(--surface2); border: 0.5px solid var(--border2); color: var(--muted); }
  .bubble { max-width: 680px; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
  .bubble-wrap.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .bubble-wrap.ai .bubble { background: var(--surface); border: 0.5px solid var(--border); border-bottom-left-radius: 4px; }
  .query-block { margin-top: 10px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 8px; overflow: hidden; }
  .query-header { padding: 6px 12px; font-size: 11px; color: var(--muted); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .query-body { padding: 12px; font-family: var(--mono); font-size: 12px; color: #b0e0c8; line-height: 1.7; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
  .copy-btn { font-size: 11px; background: none; border: 0.5px solid var(--border2); color: var(--muted); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-family: var(--font); }
  .result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  .result-table th { padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 500; color: var(--muted); border-bottom: 0.5px solid var(--border); }
  .result-table td { padding: 7px 10px; border-bottom: 0.5px solid var(--border2); }
  .result-table tr:last-child td { border-bottom: none; }
  .tag { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
  .tag-ga4 { background: rgba(124,110,245,0.15); color: #a89cf7; border: 0.5px solid rgba(124,110,245,0.3); }
  .tag-data { background: rgba(93,224,176,0.12); color: #5de0b0; border: 0.5px solid rgba(93,224,176,0.25); }
  .thinking { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dots span { animation: blink 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .input-area { padding: 16px 24px 20px; border-top: 0.5px solid var(--border); flex-shrink: 0; }
  .quick-prompts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .qp { font-size: 12px; padding: 5px 10px; border-radius: 6px; background: var(--surface2); border: 0.5px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .qp:hover { border-color: var(--accent); color: var(--text); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 12px; padding: 10px 12px; transition: border-color 0.15s; }
  .input-row:focus-within { border-color: var(--accent); }
  .chat-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: var(--font); resize: none; min-height: 24px; max-height: 120px; line-height: 1.5; }
  .chat-input::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>GA4 分析助理</div>
  <div class="auth-row">
    <div class="auth-status"><span class="auth-dot" id="auth-dot"></span><span id="auth-text">未登入</span></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <svg viewBox="0 0 18 18" fill="none" width="14" height="14"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      登入 Google
    </button>
  </div>
</div>

<div class="login-wall" id="login-wall">
  <div class="login-card">
    <h2>GA4 分析助理</h2>
    <p>請先用你的 Google 帳號登入，授權存取 GA4 資料。</p>
    <button class="login-btn" onclick="doLogin()" style="width:100%;justify-content:center;padding:11px;font-size:14px;">
      <svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div class="main" id="main">
  <div class="source-bar">
    <span style="font-size:12px;color:var(--muted);margin-right:4px;">資料來源：</span>
    <button class="src-btn active" style="padding:5px 14px;font-size:12px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.14);background:var(--accent);color:#fff;cursor:pointer;font-family:var(--font);">GA4 Data API</button>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="bubble-wrap ai">
      <div class="avatar ai">AI</div>
      <div class="bubble">
        你好！我是 GA4 分析助理，已連線到 Property <strong style="color:var(--accent2)">209293188</strong>。<br><br>
        直接用中文問我任何 GA4 資料問題，我會幫你查詢真實資料並解讀！
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="quick-prompts">
      <div class="qp" onclick="usePrompt('過去 30 天各頁面瀏覽次數排行前 10')">頁面排行</div>
      <div class="qp" onclick="usePrompt('本週新用戶來自哪些國家？')">用戶來源</div>
      <div class="qp" onclick="usePrompt('過去 7 天各裝置類型的工作階段數與跳出率')">裝置分析</div>
      <div class="qp" onclick="usePrompt('今天的總人數')">今日人數</div>
    </div>
    <div class="input-row">
      <textarea class="chat-input" id="chat-input" placeholder="用中文問任何 GA4 資料問題..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="white"><path d="M2 2l12 6-12 6V9l8-1-8-1V2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let chatHistory = [];

async function checkAuth() {
  try {
    const r = await fetch('/auth/status');
    const d = await r.json();
    if (d.loggedIn) {
      document.getElementById('auth-dot').className = 'auth-dot ok';
      document.getElementById('auth-text').textContent = '已登入';
      document.getElementById('login-wall').style.display = 'none';
      document.getElementById('main').classList.add('visible');
      document.getElementById('login-btn').style.display = 'none';
    }
  } catch(e) {}
}

function doLogin() { window.location.href = '/auth/login'; }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function usePrompt(q) { document.getElementById('chat-input').value = q; document.getElementById('chat-input').focus(); }

function addBubble(role, html) {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'ai' ? 'AI' : 'U';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;
  wrap.appendChild(av); wrap.appendChild(bub);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
  return bub;
}

function formatGA4Result(data) {
  if (data.error) return `<span style="color:#f06060">GA4 錯誤：${data.error.message || JSON.stringify(data.error)}</span>`;
  if (!data.rows || data.rows.length === 0) return '<span style="color:var(--muted)">查無資料</span>';

  const dimHeaders = (data.dimensionHeaders || []).map(h => h.name);
  const metHeaders = (data.metricHeaders || []).map(h => h.name);
  const allHeaders = [...dimHeaders, ...metHeaders];

  let html = '<div style="overflow-x:auto"><table class="result-table"><thead><tr>';
  allHeaders.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';

  data.rows.slice(0, 20).forEach(row => {
    html += '<tr>';
    (row.dimensionValues || []).forEach(v => { html += `<td>${v.value}</td>`; });
    (row.metricValues || []).forEach(v => { html += `<td style="text-align:right">${Number(v.value).toLocaleString()}</td>`; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  if (data.rowCount > 20) html += `<div style="font-size:11px;color:var(--muted);margin-top:4px">共 ${data.rowCount} 筆，顯示前 20 筆</div>`;
  return html;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  addBubble('user', q.replace(/\n/g,'<br>'));

  const area = document.getElementById('chat-area');
  const thinkWrap = document.createElement('div');
  thinkWrap.className = 'bubble-wrap ai'; thinkWrap.id = 'thinking';
  thinkWrap.innerHTML = `<div class="avatar ai">AI</div><div class="bubble thinking">分析中 <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  area.appendChild(thinkWrap); area.scrollTop = area.scrollHeight;

  const today = new Date().toISOString().slice(0,10);

  // 第一步：請 Claude 產生查詢語句
  const systemStep1 = `你是 GA4 資料分析助理。今天日期：${today}，GA4 Property ID：209293188。
使用者問問題時，你只需要輸出 GA4 API request body JSON，用 [Q] 和 [/Q] 包起來，不要加任何說明文字。
例如：[Q]{"dimensions":[{"name":"date"}],"metrics":[{"name":"activeUsers"}],"dateRanges":[{"startDate":"${today}","endDate":"${today}"}]}[/Q]
常用維度：date, pagePath, deviceCategory, country, city, sessionSource, sessionMedium, eventName
常用指標：sessions, activeUsers, newUsers, screenPageViews, bounceRate, averageSessionDuration, conversions, eventCount`;

  let queryCode = '';
  try {
    const r1 = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 500, system: systemStep1, messages: [{ role: 'user', content: q }] })
    });
    const d1 = await r1.json();
    const r1text = (d1.content || []).map(c => c.text || '').join('');
    const m1 = r1text.match(/\[Q\]([\s\S]*?)\[\/Q\]/);
    if (m1) queryCode = m1[1].trim();
  } catch(e) {}

  // 第二步：執行 GA4 查詢取得真實資料
  let ga4Data = null;
  let queryHtml = '';
  let resultHtml = '';

  if (queryCode) {
    queryHtml = `<div class="query-block"><div class="query-header"><span>GA4 查詢</span><button class="copy-btn" onclick="navigator.clipboard.writeText(${JSON.stringify(queryCode)})">複製</button></div><div class="query-body">${queryCode.replace(/</g,'&lt;')}</div></div>`;
    try {
      const ga4Res = await fetch('/api/ga4/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: queryCode
      });
      ga4Data = await ga4Res.json();
      resultHtml = `<div style="margin-top:10px"><span class="tag tag-data">真實資料</span>${formatGA4Result(ga4Data)}</div>`;
    } catch(e) {
      resultHtml = `<div style="margin-top:8px;font-size:12px;color:#f06060">查詢失敗：${e.message}</div>`;
    }
  }

  // 第三步：把真實資料交給 Claude 解讀
  const realDataStr = ga4Data ? JSON.stringify(ga4Data.rows ? ga4Data.rows.slice(0,20) : ga4Data) : '查無資料';
  const systemStep2 = `你是 GA4 資料分析助理，請根據以下真實 GA4 查詢結果回答使用者問題，使用繁體中文，直接說出數字，不要猜測。真實資料：${realDataStr}`;

  chatHistory.push({ role: 'user', content: q });
  let reply = '';
  try {
    const r2 = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemStep2, messages: chatHistory })
    });
    const d2 = await r2.json();
    reply = (d2.content || []).map(c => c.text || '').join('') || '發生錯誤，請稍後再試。';
  } catch(e) { reply = '連線錯誤：' + e.message; }

  chatHistory.push({ role: 'assistant', content: reply });
  document.getElementById('thinking')?.remove();

  addBubble('ai', `<span class="tag tag-ga4">GA4</span> ${reply.replace(/\n/g,'<br>')}${queryHtml}${resultHtml}`);
  btn.disabled = false;
}

const params = new URLSearchParams(location.search);
if (params.get('auth') === 'success') { try { window.history.replaceState({}, '', '/'); } catch(e) {} checkAuth(); }
checkAuth();
</script>
</body>
</html>
